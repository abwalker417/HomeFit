<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HomeFit{% endblock %}</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">HF</span>
      <span>
        <span class="brand-name">HomeFit</span>
        {% if current_user %}<span class="subtitle">{{ current_user.emoji }} {{ current_user.name }}</span>{% endif %}
      </span>
    </a>
    {% if current_user %}
    <nav class="top-nav">
      <a href="{{ url_for('index') }}">Dashboard</a>
      <a href="{{ url_for('exercises') }}">Exercises</a>
      <a href="{{ url_for('progress') }}">Progress</a>
      <a href="{{ url_for('profile_edit', user_id=current_user.id) }}">Profile</a>
      <a href="{{ url_for('profile_switch_out') }}">Switch</a>
    </nav>
    {% endif %}
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
